<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ability Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0c0a09; color: white; }
        .emerald-gradient { background: radial-gradient(circle at center, #10b981 0%, #059669 100%); }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // --- App State ---
        let state = {
            hasInteracted: false,
            profile: JSON.parse(localStorage.getItem('user_profile')) || null,
            currentModule: null
        };

        const modules = [
            { id: 1, title: 'അടിസ്ഥാന കമ്പ്യൂട്ടർ അറിവ്', content: 'ഡാറ്റ പ്രോസസ്സ് ചെയ്യുന്ന ഒരു ഇലക്ട്രോണിക് ഉപകരണമാണ് കമ്പ്യൂട്ടർ.' },
            { id: 2, title: 'ഇന്റർനെറ്റ് സുരക്ഷ', content: 'എപ്പോഴും ശക്തമായ പാസ്‌വേഡുകൾ ഉപയോഗിക്കുക, സംശയാസ്പദമായ ലിങ്കുകൾ ഒഴിവാക്കുക.' }
        ];

        // --- Voice Service ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ml-IN';
            window.speechSynthesis.speak(utterance);
        }

        // --- UI Components ---
        function render() {
            const app = document.getElementById('app');
            
            // 1. Start Screen
            if (!state.hasInteracted) {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-6">
                        <button onclick="startApp()" class="emerald-gradient p-12 rounded-[3rem] shadow-2xl flex flex-col items-center gap-4 active:scale-95 transition-all">
                            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center">
                                <span class="text-4xl">▶️</span>
                            </div>
                            <div class="text-center">
                                <h1 class="text-3xl font-black text-black uppercase">Start</h1>
                                <p class="text-emerald-900 font-bold">തുടങ്ങാൻ ഇവിടെ അമർത്തുക</p>
                            </div>
                        </button>
                    </div>`;
                return;
            }

            // 2. Login Screen
            if (!state.profile) {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-6">
                        <div class="w-full max-w-md bg-stone-900 p-8 rounded-[2.5rem] border border-white/10">
                            <h2 class="text-2xl font-black mb-8 text-center uppercase">Ability Learning</h2>
                            <div class="space-y-4">
                                <input id="nameInput" type="text" placeholder="പേര് (Name)" class="w-full bg-stone-800 p-4 rounded-2xl outline-none border border-stone-700 focus:border-emerald-500 font-bold">
                                <button onclick="login()" class="w-full bg-emerald-500 p-4 rounded-2xl font-black text-black uppercase">Access System</button>
                            </div>
                        </div>
                    </div>`;
                return;
            }

            // 3. Dashboard
            if (!state.currentModule) {
                app.innerHTML = `
                    <div class="min-h-screen p-6 max-w-4xl mx-auto">
                        <header class="flex justify-between items-center mb-12">
                            <h1 class="text-2xl font-black uppercase">Ability Learning</h1>
                            <button onclick="logout()" class="text-red-500 font-bold">Logout</button>
                        </header>
                        <h2 class="text-3xl font-black mb-8">ക്ലാസ്സുകൾ</h2>
                        <div class="grid gap-4">
                            ${modules.map(m => `
                                <button onclick="selectModule(${m.id})" class="w-full bg-stone-900 p-6 rounded-3xl border border-stone-800 text-left hover:border-emerald-500 transition-all">
                                    <h3 class="text-xl font-bold">${m.title}</h3>
                                    <p class="text-stone-500 text-xs uppercase mt-2">തുടങ്ങാൻ അമർത്തുക</p>
                                </button>
                            `).join('')}
                        </div>
                    </div>`;
                return;
            }

            // 4. Lesson View
            const m = modules.find(x => x.id === state.currentModule);
            app.innerHTML = `
                <div class="min-h-screen p-6 max-w-4xl mx-auto">
                    <button onclick="backToDashboard()" class="text-emerald-500 font-black mb-8">← BACK</button>
                    <div class="bg-stone-900 p-8 rounded-[2.5rem] border border-stone-800">
                        <h2 class="text-3xl font-black mb-6 text-emerald-500">${m.title}</h2>
                        <p class="text-xl leading-relaxed text-stone-300 mb-8">${m.content}</p>
                        <button onclick="speak('${m.content}')" class="w-full bg-emerald-500 p-4 rounded-2xl text-black font-black uppercase">Listen (കേൾക്കുക)</button>
                    </div>
                </div>`;
        }

        // --- Actions ---
        window.startApp = () => {
            state.hasInteracted = true;
            render();
            speak('സ്വാഗതം');
        };

        window.login = () => {
            const name = document.getElementById('nameInput').value;
            if (!name) return;
            state.profile = { fullName: name };
            localStorage.setItem('user_profile', JSON.stringify(state.profile));
            render();
        };

        window.logout = () => {
            state.profile = null;
            localStorage.removeItem('user_profile');
            render();
        };

        window.selectModule = (id) => {
            state.currentModule = id;
            render();
            const m = modules.find(x => x.id === id);
            speak(m.title);
        };

        window.backToDashboard = () => {
            state.currentModule = null;
            render();
        };

        // Initial Render
        render();
    </script>
</body>
</html>
